monitor.bluez.properties = {
  # Only register as A2DP Source (sends audio to BT speakers/headphones).
  # The a2dp_sink role (PC receives audio from BT device) is excluded because
  # it causes "Device or resource busy" conflicts during A2DP negotiation with
  # devices like the Spark 2 Audio that advertise both Audio Source and Audio
  # Sink UUIDs.
  bluez5.roles = [ a2dp_source bap_sink bap_source hfp_hf hfp_ag ]
  bluez5.hfphsp-backend = "native"
}
